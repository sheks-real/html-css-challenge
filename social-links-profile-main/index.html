<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <header>
          <img
            src="assets/images/avatar-jessica.jpeg"
            alt="Headshot of Jessica Randall"
          />
          <h1>Jessica Randall</h1>
          <p>London, United Kingdom</p>
        </header>
        <section class="brief-intro">
          <p>"Front-end developer and avid reader."</p>
        </section>

        <nav class="social-link-container" aria-label="social link">
          <ul>
            <li><a href="#" class="social-link">GitHub</a></li>
            <li><a href="#" class="social-link">Frontend Mentor</a></li>
            <li><a href="#" class="social-link">LinkedIn</a></li>
            <li><a href="#" class="social-link">Twitter</a></li>
            <li><a href="#" class="social-link">Instagram</a></li>
          </ul>
        </nav>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
        >Frontend Mentor</a
      >. Coded by <a href="#">Abhishek Kumar</a>.
    </footer>
  </body>
</html>
